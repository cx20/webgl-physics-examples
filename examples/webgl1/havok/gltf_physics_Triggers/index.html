<!DOCTYPE html>
<html>
<head>
    <title>WebGL 1.0 + Havok Triggers glTF Physics Example</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://unpkg.com/gl-matrix@3.4.4/gl-matrix-min.js"></script>
    <script src="https://cx20.github.io/gltf-test/libs/babylonjs/dev/HavokPhysics_umd.js"></script>
</head>
<body>

<script id="vs" type="x-shader/x-vertex">
attribute vec3 aPosition;
attribute vec3 aNormal;
attribute vec2 aTexCoord;

uniform mat4 uViewProj;
uniform mat4 uModel;

varying vec3 vNormal;
varying vec2 vTexCoord;
varying vec3 vWorldPos;

void main() {
    mat3 normalMatrix = mat3(uModel);
    vNormal = normalize(normalMatrix * aNormal);
    vTexCoord = aTexCoord;
    vec4 worldPos = uModel * vec4(aPosition, 1.0);
    vWorldPos = worldPos.xyz;
    gl_Position = uViewProj * worldPos;
}
</script>

<script id="fs" type="x-shader/x-fragment">
precision mediump float;

uniform sampler2D uTexture;
uniform bool uHasTexture;
uniform vec4 uBaseColor;
uniform vec3 uLightDir;
uniform vec3 uEyePos;
uniform float uMetallic;
uniform float uRoughness;

varying vec3 vNormal;
varying vec2 vTexCoord;
varying vec3 vWorldPos;

const float PI = 3.14159265359;

float DistributionGGX(float NdotH, float roughness) {
    float a  = roughness * roughness;
    float a2 = a * a;
    float d  = NdotH * NdotH * (a2 - 1.0) + 1.0;
    return a2 / (PI * d * d);
}

float GeometrySchlickGGX(float NdotX, float roughness) {
    float r = roughness + 1.0;
    float k = (r * r) / 8.0;
    return NdotX / (NdotX * (1.0 - k) + k);
}

vec3 FresnelSchlick(float cosTheta, vec3 F0) {
    float f = pow(max(1.0 - cosTheta, 0.0), 5.0);
    return F0 + (1.0 - F0) * f;
}

void main() {
    vec3 N = normalize(vNormal);
    vec3 L = normalize(uLightDir);
    vec3 V = normalize(uEyePos - vWorldPos);
    vec3 H = normalize(L + V);

    vec4 albedoSample = uBaseColor;
    if (uHasTexture) {
        albedoSample *= texture2D(uTexture, vTexCoord);
    }
    vec3 albedo = albedoSample.rgb;

    float metallic  = clamp(uMetallic,  0.0, 1.0);
    float roughness = clamp(uRoughness, 0.05, 1.0);

    vec3 F0 = mix(vec3(0.04), albedo, metallic);

    float NdotL = max(dot(N, L), 0.0);
    float NdotV = max(dot(N, V), 0.0);
    float NdotH = max(dot(N, H), 0.0);
    float HdotV = max(dot(H, V), 0.0);

    float D = DistributionGGX(NdotH, roughness);
    float G = GeometrySchlickGGX(NdotV, roughness) * GeometrySchlickGGX(NdotL, roughness);
    vec3  F = FresnelSchlick(HdotV, F0);

    vec3 kD = (1.0 - F) * (1.0 - metallic);
    vec3 specular = D * G * F / (4.0 * NdotV * NdotL + 0.001);

    vec3 Lo = (kD * albedo / PI + specular) * vec3(3.5) * NdotL;

    // Hemisphere ambient (sky / ground)
    float upBlend = N.y * 0.5 + 0.5;
    vec3 ambient = mix(vec3(0.08, 0.07, 0.06), vec3(0.10, 0.15, 0.28), upBlend) * albedo;

    vec3 color = ambient + Lo;

    // Reinhard tone mapping + gamma correction
    color = color / (color + vec3(1.0));
    color = pow(max(color, vec3(0.0)), vec3(1.0 / 2.2));

    gl_FragColor = vec4(color, albedoSample.a);
}
</script>

<script id="vs-line" type="x-shader/x-vertex">
attribute vec3 aPosition;

uniform mat4 uViewProj;
uniform mat4 uModel;

void main() {
    gl_Position = uViewProj * uModel * vec4(aPosition, 1.0);
}
</script>

<script id="fs-line" type="x-shader/x-fragment">
precision mediump float;

uniform vec4 uColor;

void main() {
    gl_FragColor = uColor;
}
</script>

<canvas id="c"></canvas>

<script type="module" src="index.js"></script>
</body>
</html>
