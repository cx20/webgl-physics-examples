<!DOCTYPE html>
<html>
<head>
  <title>WebGL 1.0 + Havok Domino Example</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
  <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
</head>
<body>

<script id="vs" type="x-shader/x-vertex">
attribute vec3 position;
attribute vec3 normal;
uniform mat4 pjMatrix;
uniform mat4 mvMatrix;
varying vec3 vNormal;

void main() {
    vNormal = normalize(mat3(mvMatrix) * normal);
    gl_Position = pjMatrix * mvMatrix * vec4(position, 1.0);
}
</script>

<script id="fs" type="x-shader/x-fragment">
precision mediump float;
uniform vec3 uColor;
varying vec3 vNormal;

void main() {
    vec3 light = normalize(vec3(1.0, 1.0, 1.0));
    float diff = max(dot(vNormal, light), 0.4);
    float fog = min(1.0, pow(gl_FragCoord.w, 2.0) * 5000.0);
    vec3 col = pow(uColor * diff * fog, vec3(0.8));
    gl_FragColor = vec4(col, 1.0);
}
</script>

<canvas id="c"></canvas>

<script src="index.js"></script>
</body>
</html>
