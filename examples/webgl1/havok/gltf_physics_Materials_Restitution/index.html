<!DOCTYPE html>
<html>
<head>
    <title>WebGL 1.0 + Havok Materials Restitution glTF Physics Example</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://unpkg.com/gl-matrix@3.4.4/gl-matrix-min.js"></script>
    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
</head>
<body>

<script id="vs" type="x-shader/x-vertex">
attribute vec3 aPosition;
attribute vec3 aNormal;
attribute vec2 aTexCoord;

uniform mat4 uViewProj;
uniform mat4 uModel;

varying vec3 vNormal;
varying vec2 vTexCoord;

void main() {
    mat3 normalMatrix = mat3(uModel);
    vNormal = normalize(normalMatrix * aNormal);
    vTexCoord = aTexCoord;
    gl_Position = uViewProj * uModel * vec4(aPosition, 1.0);
}
</script>

<script id="fs" type="x-shader/x-fragment">
precision mediump float;

uniform sampler2D uTexture;
uniform bool uHasTexture;
uniform vec4 uBaseColor;
uniform vec3 uLightDir;

varying vec3 vNormal;
varying vec2 vTexCoord;

void main() {
    vec3 N = normalize(vNormal);
    float diffuse = max(dot(N, normalize(uLightDir)), 0.25);

    vec4 base = uBaseColor;
    if (uHasTexture) {
        base *= texture2D(uTexture, vTexCoord);
    }

    gl_FragColor = vec4(base.rgb * diffuse, base.a);
}
</script>

<script id="vs-line" type="x-shader/x-vertex">
attribute vec3 aPosition;

uniform mat4 uViewProj;
uniform mat4 uModel;

void main() {
    gl_Position = uViewProj * uModel * vec4(aPosition, 1.0);
}
</script>

<script id="fs-line" type="x-shader/x-fragment">
precision mediump float;

uniform vec4 uColor;

void main() {
    gl_FragColor = uColor;
}
</script>

<canvas id="c"></canvas>

<script type="module" src="index.js"></script>
</body>
</html>
