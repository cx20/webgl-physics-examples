<!DOCTYPE html>
<html>
<head>
    <title>WebGL 1.0 + Havok Falling Marbles (glTF) Example</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://unpkg.com/gl-matrix@3.4.4/gl-matrix-min.js"></script>
    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
</head>
<body>

<script id="vs" type="x-shader/x-vertex">
attribute vec3 aPosition;
attribute vec3 aNormal;
attribute vec2 aTexCoord;
uniform mat4 uViewProj;
uniform mat4 uModel;
varying vec3 vNormal;
varying vec2 vTexCoord;
varying vec3 vWorldPos;

void main() {
    mat3 normalMatrix = mat3(uModel);
    vNormal = normalize(normalMatrix * aNormal);
    vTexCoord = aTexCoord;
    vec4 world = uModel * vec4(aPosition, 1.0);
    vWorldPos = world.xyz;
    gl_Position = uViewProj * world;
}
</script>

<script id="fs" type="x-shader/x-fragment">
precision mediump float;
uniform sampler2D uTexture;
uniform sampler2D uIridescenceMap;
uniform sampler2D uIridescenceThicknessMap;
uniform samplerCube uEnvCubeMap;
uniform bool uHasTexture;
uniform bool uHasIridescenceMap;
uniform bool uHasIridescenceThicknessMap;
uniform bool uHasEnvCubeMap;
uniform bool uUnlitTextureOnly;
uniform vec4 uBaseColor;
uniform vec3 uLightDir;
uniform vec3 uCameraPos;
uniform float uIor;
uniform float uIridescenceFactor;
uniform float uIridescenceIor;
uniform float uIridescenceThicknessMin;
uniform float uIridescenceThicknessMax;
uniform float uEnvIntensity;
uniform float uEnvExposure;
uniform float uEnvDiffuseStrength;
uniform float uMetallic;
uniform float uRoughness;
varying vec3 vNormal;
varying vec2 vTexCoord;
varying vec3 vWorldPos;

const float M_PI = 3.14159265359;
const mat3 XYZ_TO_REC709 = mat3(
     3.2404542, -0.9692660,  0.0556434,
    -1.5371385,  1.8760108, -0.2040259,
    -0.4985314,  0.0415560,  1.0572252
);

float sq(float x) {
    return x * x;
}

vec3 sq(vec3 x) {
    return x * x;
}

float saturate(float x) {
    return clamp(x, 0.0, 1.0);
}

vec3 fresnelSchlick(vec3 f0, float cosTheta) {
    return f0 + (vec3(1.0) - f0) * pow(1.0 - saturate(cosTheta), 5.0);
}

float iorToFresnel0(float transmittedIor, float incidentIor) {
    return sq((transmittedIor - incidentIor) / (transmittedIor + incidentIor));
}

vec3 fresnel0ToIor(vec3 fresnel0) {
    vec3 sqrtF0 = sqrt(fresnel0);
    return (vec3(1.0) + sqrtF0) / (vec3(1.0) - sqrtF0);
}

vec3 evalSensitivity(float opd, vec3 shift) {
    float phase = 2.0 * M_PI * opd * 1.0e-9;
    vec3 val = vec3(5.4856e-13, 4.4201e-13, 5.2481e-13);
    vec3 pos = vec3(1.6810e+06, 1.7953e+06, 2.2084e+06);
    vec3 var = vec3(4.3278e+09, 9.3046e+09, 6.6121e+09);

    vec3 xyz = val * sqrt(2.0 * M_PI * var) * cos(pos * phase + shift) * exp(-sq(phase) * var);
    xyz.x += 9.7470e-14 * sqrt(2.0 * M_PI * 4.5282e+09) * cos(2.2399e+06 * phase + shift.x) * exp(-4.5282e+09 * sq(phase));
    xyz /= 1.0685e-7;

    return XYZ_TO_REC709 * xyz;
}

vec3 evalIridescence(float outsideIor, float eta2, float cosTheta1, float thinFilmThickness, vec3 baseF0) {
    float iridescenceIor = mix(outsideIor, eta2, smoothstep(0.0, 0.03, thinFilmThickness));
    float sinTheta2Sq = sq(outsideIor / iridescenceIor) * (1.0 - sq(cosTheta1));
    float cosTheta2Sq = 1.0 - sinTheta2Sq;
    if (cosTheta2Sq < 0.0) {
        return vec3(1.0);
    }

    float cosTheta2 = sqrt(cosTheta2Sq);
    float R12 = iorToFresnel0(iridescenceIor, outsideIor) + (1.0 - iorToFresnel0(iridescenceIor, outsideIor)) * pow(1.0 - cosTheta1, 5.0);
    float T121 = 1.0 - R12;
    float phi12 = 0.0;
    if (iridescenceIor < outsideIor) {
        phi12 = M_PI;
    }
    float phi21 = M_PI - phi12;

    vec3 baseIOR = fresnel0ToIor(clamp(baseF0, 0.0, 0.9999));
    vec3 R1 = sq((baseIOR - vec3(iridescenceIor)) / (baseIOR + vec3(iridescenceIor)));
    vec3 R23 = fresnelSchlick(R1, cosTheta2);
    vec3 phi23 = vec3(0.0);
    if (baseIOR.x < iridescenceIor) phi23.x = M_PI;
    if (baseIOR.y < iridescenceIor) phi23.y = M_PI;
    if (baseIOR.z < iridescenceIor) phi23.z = M_PI;

    float opd = 2.0 * iridescenceIor * thinFilmThickness * cosTheta2;
    vec3 phi = vec3(phi21) + phi23;

    vec3 R123 = clamp(vec3(R12) * R23, 1e-5, 0.9999);
    vec3 r123 = sqrt(R123);
    vec3 Rs = sq(vec3(T121)) * R23 / (vec3(1.0) - R123);

    vec3 C0 = vec3(R12) + Rs;
    vec3 I = C0;

    vec3 Cm = Rs - vec3(T121);
    for (int m = 1; m <= 2; ++m) {
        Cm *= r123;
        vec3 Sm = 2.0 * evalSensitivity(float(m) * opd, float(m) * phi);
        I += Cm * Sm;
    }

    return max(I, vec3(0.0));
}

void main() {
    vec3 N = normalize(vNormal);
    vec3 L = normalize(uLightDir);
    vec3 V = normalize(uCameraPos - vWorldPos);
    vec3 H = normalize(L + V);
    float NdotV = max(dot(N, V), 0.0);
    float NdotL = max(dot(N, L), 0.0);
    float NdotH = max(dot(N, H), 0.0);

    float ior = max(1.0, uIor);
    float f0 = pow((ior - 1.0) / (ior + 1.0), 2.0);
    vec3 baseF0 = mix(vec3(f0), uBaseColor.rgb, clamp(uMetallic, 0.0, 1.0));
    vec3 fresnel = fresnelSchlick(baseF0, NdotV);

    float irFactor = uIridescenceFactor;
    if (uHasIridescenceMap) {
        irFactor *= texture2D(uIridescenceMap, vTexCoord).r;
    }
    float irThickness = uIridescenceThicknessMax;
    if (uHasIridescenceThicknessMap) {
        float t = texture2D(uIridescenceThicknessMap, vTexCoord).g;
        irThickness = mix(uIridescenceThicknessMin, uIridescenceThicknessMax, t);
    }

    vec4 base = uBaseColor;
    if (uHasTexture) {
        base *= texture2D(uTexture, vTexCoord);
    }

    if (uUnlitTextureOnly) {
        gl_FragColor = vec4(base.rgb, base.a);
        return;
    }

    vec3 irFresnel = evalIridescence(1.0, uIridescenceIor, NdotV, irThickness, baseF0);
    float irMix = clamp(irFactor * 1.25, 0.0, 1.0);
    vec3 specColor = mix(fresnel, irFresnel, irMix);

    float roughness = clamp(uRoughness, 0.04, 1.0);
    float metallic = clamp(uMetallic, 0.0, 1.0);
    float shininess = mix(256.0, 8.0, roughness * roughness);
    float specLobe = pow(max(NdotH, 0.0), shininess);

    float kd = (1.0 - metallic) * (1.0 - max(max(specColor.r, specColor.g), specColor.b));
    vec3 directDiffuse = base.rgb * (0.15 + 0.85 * NdotL) * kd;
    vec3 directSpec = specColor * specLobe * mix(0.3, 1.1, metallic);

    vec3 color = directDiffuse + directSpec;

    if (uHasEnvCubeMap) {
        vec3 R = normalize(reflect(-V, N));
        vec3 blurredR = normalize(mix(R, N, roughness * roughness));
        vec3 envDiffuse = textureCube(uEnvCubeMap, N).rgb * uEnvExposure;
        vec3 envSpec = textureCube(uEnvCubeMap, blurredR).rgb * uEnvExposure;

        color += base.rgb * envDiffuse * ((0.08 + 0.22 * (1.0 - roughness)) * kd * uEnvIntensity * uEnvDiffuseStrength);
        color += specColor * envSpec * ((0.65 + 0.55 * metallic) * uEnvIntensity);
    }

    color = color / (color + vec3(1.0));
    color = pow(color, vec3(1.0 / 2.2));

    gl_FragColor = vec4(color, base.a);
}
</script>

<script id="skybox-vs" type="x-shader/x-vertex">
attribute vec3 aPosition;
uniform mat4 uProjection;
uniform mat4 uViewNoTranslation;
varying vec3 vDir;

void main() {
    vDir = aPosition;
    vec4 pos = uProjection * uViewNoTranslation * vec4(aPosition, 1.0);
    gl_Position = pos.xyww;
}
</script>

<script id="skybox-fs" type="x-shader/x-fragment">
precision mediump float;
uniform samplerCube uEnvCubeMap;
uniform float uEnvExposure;
varying vec3 vDir;

void main() {
    vec3 env = textureCube(uEnvCubeMap, normalize(vDir)).rgb * uEnvExposure;
    env = env / (env + vec3(1.0));
    env = pow(env, vec3(1.0 / 2.2));
    gl_FragColor = vec4(env, 1.0);
}
</script>

<canvas id="c"></canvas>

<script type="module" src="index.js"></script>
</body>
</html>
