<!DOCTYPE html>
<html>
<head>
  <title>WebGPU + Oimo.js Textured Cube Example</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/oimo/1.0.9/oimo.js"></script>
</head>
<body>

<script id="vs" type="x-shader/x-vertex">
struct Uniforms {
    modelViewProjectionMatrix : mat4x4<f32>
};
@binding(0) @group(0) var<uniform> uniforms : Uniforms;

struct VertexOutput {
    @builtin(position) Position : vec4<f32>,
    @location(0) vTextureCoord : vec2<f32>
}

@vertex
fn main(
    @location(0) position : vec3<f32>,
    @location(1) textureCoord : vec2<f32>
) -> VertexOutput {
    var output : VertexOutput;
    output.vTextureCoord = textureCoord;
    output.Position = uniforms.modelViewProjectionMatrix * vec4<f32>(position, 1.0);
    return output;
}
</script>

<script id="fs" type="x-shader/x-fragment">
@binding(1) @group(0) var mySampler : sampler;
@binding(2) @group(0) var myTexture : texture_2d<f32>;

@fragment
fn main(
    @location(0) vTextureCoord : vec2<f32>
) -> @location(0) vec4<f32> {
    return textureSample(myTexture, mySampler, vTextureCoord);
}
</script>

<script id="vs-line" type="x-shader/x-vertex">
struct LineUniforms {
    viewProj : mat4x4<f32>,
    model : mat4x4<f32>,
    color : vec4<f32>
};
@group(0) @binding(0) var<uniform> uniforms : LineUniforms;
@vertex
fn main(@location(0) pos : vec3<f32>) -> @builtin(position) vec4<f32> {
    return uniforms.viewProj * uniforms.model * vec4<f32>(pos, 1.0);
}
</script>
<script id="fs-line" type="x-shader/x-fragment">
struct LineUniforms {
    viewProj : mat4x4<f32>,
    model : mat4x4<f32>,
    color : vec4<f32>
};
@group(0) @binding(0) var<uniform> uniforms : LineUniforms;
@fragment
fn main() -> @location(0) vec4<f32> { return uniforms.color; }
</script>

<canvas id="c" width="465" height="465"></canvas>

<script src="index.js"></script>
</body>
</html>
