<!DOCTYPE html>
<html>
<head>
  <title>WebGPU + Havok Domino Example</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
  <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
</head>
<body>

<script id="vs" type="x-shader/x-vertex">
struct Uniforms {
    viewProjection : mat4x4<f32>,
    model          : mat4x4<f32>,
    color          : vec3<f32>,
    _pad           : f32
};

@group(0) @binding(0) var<uniform> uniforms : Uniforms;

struct VSOut {
    @builtin(position) Position : vec4<f32>,
    @location(0) vNormal : vec3<f32>,
    @location(1) vColor  : vec3<f32>
};

@vertex
fn main(
    @location(0) position : vec3<f32>,
    @location(1) normal   : vec3<f32>
) -> VSOut {
    var out : VSOut;
    let normalMatrix = mat3x3<f32>(
        uniforms.model[0].xyz,
        uniforms.model[1].xyz,
        uniforms.model[2].xyz
    );
    out.vNormal   = normalize(normalMatrix * normal);
    out.Position  = uniforms.viewProjection * uniforms.model * vec4<f32>(position, 1.0);
    out.vColor    = uniforms.color;
    return out;
}
</script>

<script id="fs" type="x-shader/x-fragment">
@fragment
fn main(
    @location(0) vNormal : vec3<f32>,
    @location(1) vColor  : vec3<f32>
) -> @location(0) vec4<f32> {
    let light = normalize(vec3<f32>(1.0, 1.0, 1.0));
    let diff  = max(dot(vNormal, light), 0.4);
    let col   = pow(vColor * diff, vec3<f32>(0.8));
    return vec4<f32>(col, 1.0);
}
</script>

<canvas id="c"></canvas>

<script src="index.js"></script>
</body>
</html>
