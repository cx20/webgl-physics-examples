<!DOCTYPE html>
<html>
<head>
  <title>WebGPU + WGSL Compute Shader Falling Coins Example</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<script id="cs" type="x-shader/x-compute">
const COIN_CAPACITY : u32 = 8192u;
const GRID_X : u32 = 64u;
const GRID_Y : u32 = 64u;
const GRID_Z : u32 = 64u;
const CELL_CAPACITY : u32 = 8u;
const CELL_SIZE : f32 = 1.7;
const FLOOR_Y_C : f32 = -10.0;

// axis  = fixed random rotation axis per coin (set at init, never changed).
// spin  = x: accumulated angle, y: per-coin spin rate (set at init, never changed).
// Using a fixed axis + speed-driven angle instead of full angular momentum keeps the
// tumble visually convincing while avoiding angular-velocity integration instability.
struct CoinState {
    position : vec4<f32>,
    velocity : vec4<f32>,
    axis     : vec4<f32>,   // xyz = unit rotation axis (w unused)
    spin     : vec4<f32>,   // x = current angle, y = spin rate (zw unused)
}

struct CoinInfo {
    size     : vec4<f32>, // radius, halfHeight, textureIndex, seed
    material : vec4<f32>, // restitution, friction, metallic, roughness
    color    : vec4<f32>,
}

struct SimParams {
    dt          : f32,
    gravity     : f32,
    groundY     : f32,
    damping     : f32,
    _pad0       : f32,
    restitution : f32,
    friction    : f32,   // floor friction multiplier (applied to x/z velocity on contact)
    time        : f32,
}

const GROUND_HALF  : f32 = 13.0;
const SPAWN_RADIUS : f32 = 3.0;
const SPAWN_RATE   : f32 = 350.0;
const MAX_SPEED    : f32 = 25.0;
const SPIN_BASE    : f32 = 4.0;    // minimum spin speed (rad/s per unit spin rate)
const SPIN_SPEED_K : f32 = 0.5;   // extra spin per m/s of linear speed
const FLOOR_SPIN_F : f32 = 0.3;   // spin factor when resting on the floor

@group(0) @binding(0) var<storage, read>            srcStates : array<CoinState>;
@group(0) @binding(1) var<storage, read_write>      dstStates : array<CoinState>;
@group(0) @binding(2) var<storage, read>            infos     : array<CoinInfo>;
@group(0) @binding(3) var<uniform>                  params    : SimParams;
@group(0) @binding(4) var<storage, read>            grid      : array<u32>;

fn cellCoord(p : vec3<f32>) -> vec3<i32> {
    return vec3<i32>(
        i32(floor(p.x / CELL_SIZE + f32(GRID_X) * 0.5)),
        i32(floor((p.y - FLOOR_Y_C) / CELL_SIZE)),
        i32(floor(p.z / CELL_SIZE + f32(GRID_Z) * 0.5)),
    );
}
fn cellHash(c : vec3<i32>) -> i32 {
    if (c.x < 0 || c.x >= i32(GRID_X)) { return -1; }
    if (c.y < 0 || c.y >= i32(GRID_Y)) { return -1; }
    if (c.z < 0 || c.z >= i32(GRID_Z)) { return -1; }
    return c.x + c.y * i32(GRID_X) + c.z * i32(GRID_X) * i32(GRID_Y);
}

fn pcgHash(v : u32) -> u32 {
    let state = v * 747796405u + 2891336453u;
    let word = ((state >> ((state >> 28u) + 4u)) ^ state) * 277803737u;
    return (word >> 22u) ^ word;
}
fn rndU(seed : u32) -> f32 {
    return f32(pcgHash(seed)) * (1.0 / 4294967296.0);
}

@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) id : vec3<u32>) {
    let i = id.x;
    if (i >= COIN_CAPACITY) { return; }

    let info     = infos[i];
    let radius   = info.size.x;
    let seed     = srcStates[i].position.w;
    let axis     = srcStates[i].axis;        // pass through unchanged
    let spinRate = srcStates[i].spin.y;      // pass through unchanged

    var pos   = srcStates[i].position.xyz;
    var vel   = srcStates[i].velocity.xyz;
    var angle = srcStates[i].spin.x;

    let sleepY    = params.groundY - 30.0;
    let spawnY    = params.groundY + 50.0;
    let spawnTime = f32(i) / SPAWN_RATE;

    if (pos.y < sleepY) {
        if (params.time >= spawnTime) {
            let salt = i * 2654435761u + u32(params.time * 60.0) * 40503u;
            let ang  = rndU(salt) * 6.28318530718;
            let rad  = sqrt(rndU(salt + 1u)) * SPAWN_RADIUS;
            pos   = vec3<f32>(cos(ang) * rad, spawnY, sin(ang) * rad);
            vel   = vec3<f32>(0.0, -1.0, 0.0);
            angle = 0.0;
        }
        dstStates[i].position = vec4<f32>(pos, seed);
        dstStates[i].velocity = vec4<f32>(vel, 0.0);
        dstStates[i].axis     = axis;
        dstStates[i].spin     = vec4<f32>(angle, spinRate, 0.0, 0.0);
        return;
    }

    // 1. Gravity
    vel.y -= params.gravity * params.dt;

    // 2. Coin–coin collision: Jacobi (accumulate all corrections, apply once) so the
    //    push-out is independent of the cell scan order and the pile spreads evenly.
    var posCorr = vec3<f32>(0.0);
    var velCorr = vec3<f32>(0.0);
    let myCoord = cellCoord(pos);
    for (var dz = -1; dz <= 1; dz = dz + 1) {
        for (var dy = -1; dy <= 1; dy = dy + 1) {
            for (var dx = -1; dx <= 1; dx = dx + 1) {
                let cidx = cellHash(myCoord + vec3<i32>(dx, dy, dz));
                if (cidx < 0) { continue; }
                let cellBase = u32(cidx) * (CELL_CAPACITY + 1u);
                let count    = min(grid[cellBase], CELL_CAPACITY);
                for (var k = 0u; k < count; k = k + 1u) {
                    let j = grid[cellBase + 1u + k];
                    if (j == i) { continue; }
                    let other      = srcStates[j];
                    let otherRadius = infos[j].size.x;
                    let delta      = pos - other.position.xyz;
                    let dist       = length(delta);
                    let minDist    = radius + otherRadius;
                    if (dist < minDist && dist > 1e-4) {
                        let n       = delta / dist;
                        let overlap = minDist - dist;
                        posCorr += n * (overlap * 0.5);
                        let relVel = vel - other.velocity.xyz;
                        let vn     = dot(relVel, n);
                        if (vn < 0.0) {
                            velCorr += n * (-(vn * (1.0 + params.restitution) * 0.5));
                        }
                    }
                }
            }
        }
    }
    pos += posCorr;
    vel += velCorr;

    // 3. Floor
    let onFloor = abs(pos.x) < GROUND_HALF && abs(pos.z) < GROUND_HALF;
    if (onFloor && pos.y - radius < params.groundY) {
        pos.y = params.groundY + radius;
        if (vel.y < 0.0) { vel.y = -vel.y * params.restitution; }
        vel.x *= params.friction;
        vel.z *= params.friction;
    }

    // 4. Speed cap
    let speed = length(vel);
    if (speed > MAX_SPEED) { vel = vel * (MAX_SPEED / speed); }

    // 5. Position update
    pos += vel * params.dt;

    // 6. Spin: speed-proportional, slows when resting on the floor
    let inAir      = !onFloor || pos.y - radius > params.groundY + 0.05;
    let spinFactor = select(FLOOR_SPIN_F, 1.0, inAir);
    angle += spinRate * (SPIN_BASE + speed * SPIN_SPEED_K) * spinFactor * params.dt;

    // 7. Linear damping
    vel *= params.damping;

    if (pos.y < sleepY) {
        pos = vec3<f32>(0.0, -1000.0 - f32(i) * 0.01, 0.0);
        vel = vec3<f32>(0.0, 0.0, 0.0);
    }

    dstStates[i].position = vec4<f32>(pos, seed);
    dstStates[i].velocity = vec4<f32>(vel, 0.0);
    dstStates[i].axis     = axis;
    dstStates[i].spin     = vec4<f32>(angle, spinRate, 0.0, 0.0);
}
</script>

<!-- Clears the spatial grid (per sub-step, before it is rebuilt). -->
<script id="cs-clear" type="x-shader/x-compute">
@group(0) @binding(0) var<storage, read_write> grid : array<u32>;
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) id : vec3<u32>) {
    let i = id.x;
    if (i < arrayLength(&grid)) { grid[i] = 0u; }
}
</script>

<!-- Inserts each awake coin into its grid cell (atomic append, capacity-capped). -->
<script id="cs-build" type="x-shader/x-compute">
const GRID_X : u32 = 64u;
const GRID_Y : u32 = 64u;
const GRID_Z : u32 = 64u;
const CELL_CAPACITY : u32 = 8u;
const CELL_SIZE : f32 = 1.7;
const FLOOR_Y_C : f32 = -10.0;
struct CoinState {
    position : vec4<f32>,
    velocity : vec4<f32>,
    axis     : vec4<f32>,
    spin     : vec4<f32>,
}
@group(0) @binding(0) var<storage, read> states : array<CoinState>;
@group(0) @binding(1) var<storage, read_write> grid : array<atomic<u32>>;
fn cellCoord(p : vec3<f32>) -> vec3<i32> {
    return vec3<i32>(
        i32(floor(p.x / CELL_SIZE + f32(GRID_X) * 0.5)),
        i32(floor((p.y - FLOOR_Y_C) / CELL_SIZE)),
        i32(floor(p.z / CELL_SIZE + f32(GRID_Z) * 0.5)),
    );
}
fn cellHash(c : vec3<i32>) -> i32 {
    if (c.x < 0 || c.x >= i32(GRID_X)) { return -1; }
    if (c.y < 0 || c.y >= i32(GRID_Y)) { return -1; }
    if (c.z < 0 || c.z >= i32(GRID_Z)) { return -1; }
    return c.x + c.y * i32(GRID_X) + c.z * i32(GRID_X) * i32(GRID_Y);
}
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) id : vec3<u32>) {
    let i = id.x;
    if (i >= arrayLength(&states)) { return; }
    let cidx = cellHash(cellCoord(states[i].position.xyz));
    if (cidx < 0) { return; }   // asleep / out-of-bounds coins are not inserted
    let base = u32(cidx) * (CELL_CAPACITY + 1u);
    let slot = atomicAdd(&grid[base], 1u);
    if (slot < CELL_CAPACITY) {
        atomicStore(&grid[base + 1u + slot], i);
    }
}
</script>

<script id="vs" type="x-shader/x-vertex">
struct Camera {
    viewProjection : mat4x4<f32>,
    eyePosition : vec4<f32>,
}

struct CoinState {
    position : vec4<f32>,
    velocity : vec4<f32>,
    axis     : vec4<f32>,   // xyz = unit rotation axis
    spin     : vec4<f32>,   // x = current angle
}

struct CoinInfo {
    size     : vec4<f32>,
    material : vec4<f32>,
    color    : vec4<f32>,
}

struct StaticItem {
    position : vec4<f32>,
    scale    : vec4<f32>,
    color    : vec4<f32>,
}

struct VSOut {
    @builtin(position) position : vec4<f32>,
    @location(0) normal : vec3<f32>,
    @location(1) uv : vec2<f32>,
    @location(2) color : vec4<f32>,
    @location(3) atlas : f32,
    @location(4) mode : f32,
    @location(5) material : vec2<f32>,
    @location(6) worldPosition : vec3<f32>,
}

const COIN_CAPACITY : u32 = 8192u;

@group(0) @binding(0) var<uniform> camera : Camera;
@group(0) @binding(1) var<storage, read> states : array<CoinState>;
@group(0) @binding(2) var<storage, read> infos : array<CoinInfo>;
@group(0) @binding(3) var<storage, read> staticItems : array<StaticItem>;

fn rotByAxisAngle(v : vec3<f32>, axis : vec3<f32>, angle : f32) -> vec3<f32> {
    let cs = cos(angle);
    let sn = sin(angle);
    return v * cs + cross(axis, v) * sn + axis * dot(axis, v) * (1.0 - cs);
}

@vertex
fn main(@location(0) position : vec3<f32>, @location(1) normal : vec3<f32>, @location(2) uv : vec2<f32>, @builtin(instance_index) instance : u32) -> VSOut {
    var out : VSOut;
    if (instance < COIN_CAPACITY) {
        let state = states[instance];
        let info  = infos[instance];
        let axis  = normalize(state.axis.xyz);
        let angle = state.spin.x;
        let local = vec3<f32>(position.x * info.size.x, position.y * info.size.y * 2.0, position.z * info.size.x);
        let world = rotByAxisAngle(local, axis, angle) + state.position.xyz;
        out.position = camera.viewProjection * vec4<f32>(world, 1.0);
        out.normal = normalize(rotByAxisAngle(normal, axis, angle));
        out.uv = uv;
        out.color = info.color;
        out.atlas = info.size.z;
        out.mode = 1.0;
        out.material = info.material.zw;
        out.worldPosition = world;
    } else {
        let item = staticItems[instance - COIN_CAPACITY];
        let world = position * item.scale.xyz + item.position.xyz;
        out.position = camera.viewProjection * vec4<f32>(world, 1.0);
        out.normal = normal;
        out.uv = uv;
        out.color = item.color;
        out.atlas = 0.0;
        out.mode = 0.0;
        out.material = vec2<f32>(0.0, 0.85);
        out.worldPosition = world;
    }
    return out;
}
</script>

<script id="fs" type="x-shader/x-fragment">
struct Camera {
    viewProjection : mat4x4<f32>,
    eyePosition : vec4<f32>,
}

@group(0) @binding(0) var<uniform> camera : Camera;
@group(0) @binding(4) var samp : sampler;
@group(0) @binding(5) var atlasTex : texture_2d<f32>;
@group(0) @binding(6) var envTex : texture_cube<f32>;

@fragment
fn main(@location(0) normal : vec3<f32>, @location(1) uv : vec2<f32>, @location(2) color : vec4<f32>, @location(3) atlas : f32, @location(4) mode : f32, @location(5) material : vec2<f32>, @location(6) worldPosition : vec3<f32>) -> @location(0) vec4<f32> {
    let baseNormal = normalize(normal);
    let lightDir = normalize(vec3<f32>(0.45, 1.0, 0.35));
    let viewDir = normalize(camera.eyePosition.xyz - worldPosition);
    var materialUv = uv;
    if (mode > 0.5 && abs(baseNormal.y) < 0.85) {
        materialUv.x = 1.0 - uv.x * 0.68;
    }
    let atlasUv = vec2<f32>((materialUv.x + atlas) * 0.5, materialUv.y);
    let tex = textureSample(atlasTex, samp, atlasUv);
    let up = select(vec3<f32>(0.0, 1.0, 0.0), vec3<f32>(1.0, 0.0, 0.0), abs(baseNormal.y) > 0.85);
    let tangent = normalize(cross(up, baseNormal));
    let bitangent = normalize(cross(baseNormal, tangent));
    let normalTex = tex.xyz * 2.0 - vec3<f32>(1.0);
    let bumpedNormal = normalize(baseNormal + (tangent * normalTex.x + bitangent * normalTex.y) * 0.12 + baseNormal * normalTex.z * 0.04);
    let n = normalize(select(baseNormal, bumpedNormal, mode > 0.5));
    let halfDir = normalize(lightDir + viewDir);
    let nDotL = max(dot(n, lightDir), 0.0);
    let nDotV = max(dot(n, viewDir), 0.0);
    let nDotH = max(dot(n, halfDir), 0.0);
    let vDotH = max(dot(viewDir, halfDir), 0.0);
    let coinShade = vec3<f32>(1.0);
    let albedo = select(color.rgb, color.rgb * coinShade, mode > 0.5);
    let metallic = select(0.0, material.x, mode > 0.5);
    let roughness = clamp(material.y, 0.08, 1.0);
    let f0 = mix(vec3<f32>(0.04), albedo, metallic);
    let fresnel = f0 + (vec3<f32>(1.0) - f0) * pow(1.0 - vDotH, 5.0);
    let specPower = mix(96.0, 10.0, roughness);
    let specular = fresnel * pow(nDotH, specPower) * mix(1.1, 0.32, roughness);
    let diffuse = albedo * nDotL * (1.0 - metallic);
    let reflectDir = normalize(reflect(-viewDir, n));
    let envSpec = textureSample(envTex, samp, reflectDir).rgb * 1.25;
    let envDiffuse = textureSample(envTex, samp, n).rgb * 0.28;
    let specColor = fresnel * mix(0.72, 1.08, metallic);
    let envReflection = envSpec * specColor * mix(0.42, 0.78, metallic) * mix(1.0, 0.58, roughness);
    let ambient = albedo * select(0.18, 0.20, mode > 0.5);
    let diffuseIbl = albedo * envDiffuse * (1.0 - metallic) * 0.35;
    let colorOut = ambient + diffuseIbl + envReflection + diffuse * 0.45 + specular * max(nDotL, 0.25) * max(nDotV, 0.3);
    return vec4<f32>(pow(max(colorOut, vec3<f32>(0.0)), vec3<f32>(1.0 / 2.2)), color.a);
}
</script>

<script id="wvs" type="x-shader/x-vertex">
struct Camera {
    viewProjection : mat4x4<f32>,
    eyePosition : vec4<f32>,
}

struct CoinState {
    position : vec4<f32>,
    velocity : vec4<f32>,
    axis     : vec4<f32>,
    spin     : vec4<f32>,
}

struct CoinInfo {
    size     : vec4<f32>,
    material : vec4<f32>,
    color    : vec4<f32>,
}

@group(0) @binding(0) var<uniform> camera : Camera;
@group(0) @binding(1) var<storage, read> states : array<CoinState>;
@group(0) @binding(2) var<storage, read> infos : array<CoinInfo>;

@vertex
fn main(@location(0) position : vec3<f32>, @builtin(instance_index) instance : u32) -> @builtin(position) vec4<f32> {
    let state = states[instance];
    let info = infos[instance];
    // The collider is a sphere of the coin radius; orientation is irrelevant.
    let world = state.position.xyz + position * info.size.x;
    return camera.viewProjection * vec4<f32>(world, 1.0);
}
</script>

<script id="wfs" type="x-shader/x-fragment">
@fragment
fn main() -> @location(0) vec4<f32> {
    return vec4<f32>(0.1, 1.0, 0.35, 0.72);
}
</script>

<script id="skybox-vs" type="x-shader/x-vertex">
struct SkyboxUniforms {
    projection : mat4x4<f32>,
    viewNoTranslation : mat4x4<f32>,
    exposure : f32,
    _pad0 : vec3<f32>,
};

@group(0) @binding(0) var<uniform> uniforms : SkyboxUniforms;

struct VSOut {
    @builtin(position) Position : vec4<f32>,
    @location(0) dir : vec3<f32>,
};

@vertex
fn main(@location(0) position : vec3<f32>) -> VSOut {
    var out : VSOut;
    out.dir = position;
    let pos = uniforms.projection * uniforms.viewNoTranslation * vec4<f32>(position, 1.0);
    out.Position = vec4<f32>(pos.xy, pos.w, pos.w);
    return out;
}
</script>

<script id="skybox-fs" type="x-shader/x-fragment">
struct SkyboxUniforms {
    projection : mat4x4<f32>,
    viewNoTranslation : mat4x4<f32>,
    exposure : f32,
    _pad0 : vec3<f32>,
};

@group(0) @binding(0) var<uniform> uniforms : SkyboxUniforms;
@group(0) @binding(1) var samp : sampler;
@group(0) @binding(2) var envCubeTex : texture_cube<f32>;

@fragment
fn main(@location(0) dir : vec3<f32>) -> @location(0) vec4<f32> {
    var env = textureSample(envCubeTex, samp, normalize(dir)).rgb * uniforms.exposure;
    env = env / (env + vec3<f32>(1.0));
    env = pow(env, vec3<f32>(1.0 / 2.2));
    return vec4<f32>(env, 1.0);
}
</script>
