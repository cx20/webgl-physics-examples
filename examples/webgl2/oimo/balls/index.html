<!DOCTYPE html>
<html>
<head>
  <title>WebGL 2.0 + Oimo.js Falling Balls Example</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://unpkg.com/gl-matrix@3.4.4/gl-matrix-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/oimo/1.0.9/oimo.js"></script>
</head>
<body>

<script id="vs" type="x-shader/x-vertex">#version 300 es
in vec3 aPosition;
in vec3 aNormal;
in vec2 aTexCoord;
uniform mat4 uViewProj;
uniform mat4 uModel;
out vec3 vNormal;
out vec2 vTexCoord;

void main() {
    mat3 normalMatrix = mat3(uModel);
    vNormal = normalize(normalMatrix * aNormal);
    vTexCoord = aTexCoord;
    gl_Position = uViewProj * uModel * vec4(aPosition, 1.0);
}
</script>

<script id="fs" type="x-shader/x-fragment">#version 300 es
precision mediump float;
uniform sampler2D uTexture;
uniform vec3 uTint;
uniform vec3 uLightDir;
uniform float uAlpha;
in vec3 vNormal;
in vec2 vTexCoord;
out vec4 fragColor;

void main() {
    vec3 N = normalize(vNormal);
    float diffuse = max(dot(N, normalize(uLightDir)), 0.25);
    vec3 tex = texture(uTexture, vTexCoord).rgb;
  fragColor = vec4(tex * uTint * diffuse, uAlpha);
}
</script>

<canvas id="c"></canvas>

<script type="module" src="index.js"></script>
</body>
</html>
